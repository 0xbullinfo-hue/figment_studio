
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figment Studio | Premium Architectural Visualization</title>
  <meta name="description" content="Figment Studio — Nigeria's leading architectural visualization house. Cinematic 3D rendering, AI-guided design, and private delivery for world-class projects." />

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500;600&family=Outfit:wght@200;300;400;500;600&family=Tenor+Sans&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet">

  <link rel="icon" type="image/png" href="/logo.png" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            /* ── Core Dark Grey Palette (Old system mapping) ── */
            "bg":          "#121212",   /* page background */
            "bg-2":        "#181818",   /* section alternating */
            "bg-3":        "#1E1E1E",   /* elevated cards */
            "bg-4":        "#262626",   /* highest card */
            "sidebar":     "#0E0E0E",   /* sidebar panel */

            /* ── Text (Old) ── */
            "t-1":  "#FFFFFF",          /* headings */
            "t-2":  "#BDBDBD",          /* body */
            "t-3":  "#737373",          /* muted / labels */
            "t-4":  "#3D3D3D",          /* faintest */

            /* ── Brand (Old) ── */
            "accent":       "#F07A3A",  /* primary orange */
            "accent-dim":   "rgba(240,122,58,0.15)",
            "accent-border":"rgba(240,122,58,0.25)",

            /* ── Borders (Old) ── */
            "b-1":  "rgba(255,255,255,0.08)",  /* default border */
            "b-2":  "rgba(255,255,255,0.14)",  /* stronger */

            /* ── Unified Layout Variables ── */
            "background":      "#121212",
            "background-alt":  "#181818",
            "surface":         "#1E1E1E",
            "surface-alt":     "#262626",
            "border-ui":       "rgba(255,255,255,0.06)",
            "border-strong":   "rgba(255,255,255,0.14)",
            "primary":         "#F07A3A",
            "primary-light":   "rgba(240,122,58,0.12)",
            "primary-hover":   "#FF8B4A",
            "text-main":       "#FFFFFF",
            "text-secondary":  "#BDBDBD",
            "text-muted":      "#737373",
            "text-faint":      "#3E3E3E",
          },
          fontFamily: {
            "display": ["Tenor Sans", "Cormorant Garamond", "Georgia", "serif"],
            "sans":    ["Outfit", "DM Sans", "Inter", "sans-serif"],
            "mono":    ["JetBrains Mono", "monospace"],
          },
          letterSpacing: {
            "label": "0.16em",
            "wide":  "0.08em",
          },
        },
      },
    }
  </script>

  <style type="text/tailwindcss">
    @layer base {
      *, *::before, *::after {
        -webkit-font-smoothing: antialiased;
        box-sizing: border-box;
      }
      html { scroll-behavior: smooth; }

      body {
        @apply bg-background text-text-secondary font-sans;
        font-size: 15px;
        line-height: 1.7;
      }

      ::selection { background: rgba(240,122,58,0.22); color: #F07A3A; }

      ::-webkit-scrollbar       { width: 4px; }
      ::-webkit-scrollbar-track  { background: #0E0E0E; }
      ::-webkit-scrollbar-thumb  { background: #333; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #F07A3A; }
    }

    @layer utilities {
      /* ── Typography ── */
      .h-display {
        font-family: 'Tenor Sans', sans-serif;
        font-weight: 300;
        color: #FFFFFF;
        line-height: 1.06;
        letter-spacing: -0.02em;
      }
      .h-section {
        font-family: 'Tenor Sans', sans-serif;
        font-weight: 400;
        color: #FFFFFF;
        line-height: 1.12;
        letter-spacing: -0.015em;
      }
      .label {
        font-family: 'Outfit', sans-serif;
        font-size: 0.65rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: #737373;
      }
      .body-sm { @apply text-text-secondary text-sm leading-relaxed; font-family: 'Outfit', sans-serif; }
      .body-xs { @apply text-text-muted text-xs leading-relaxed; font-family: 'Outfit', sans-serif; }

      /* ── Buttons ── */
      .btn-fill {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 2rem;
        background: #F07A3A;
        color: #fff;
        font-family: 'Outfit', sans-serif;
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border: 1px solid transparent;
        transition: all 0.25s ease;
        cursor: pointer;
      }
      .btn-fill:hover { background: #FF8B4A; }

      .btn-outline {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 2rem;
        background: transparent;
        color: #FFFFFF;
        font-family: 'Outfit', sans-serif;
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border: 1px solid rgba(255,255,255,0.2);
        transition: all 0.25s ease;
        cursor: pointer;
      }
      .btn-outline:hover { border-color: #F07A3A; color: #F07A3A; }

      .btn-text {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: #FFFFFF;
        font-family: 'Outfit', sans-serif;
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        transition: gap 0.2s ease, color 0.2s ease;
      }
      .btn-text:hover { gap: 0.75rem; color: #F07A3A; }

      /* ── Section spacing ── */
      .sec       { padding: 7rem 5rem; }
      .sec-sm    { padding: 5rem 5rem; }
      @media(max-width:1024px) { .sec { padding: 5rem 2.5rem; } .sec-sm { padding: 4rem 2.5rem; } }
      @media(max-width:640px)  { .sec { padding: 4rem 1.5rem; } .sec-sm { padding: 3rem 1.5rem; } }

      .wrap    { max-width: 1280px; margin: 0 auto; }
      .wrap-lg { max-width: 1100px; margin: 0 auto; }
      .wrap-md { max-width: 820px; margin: 0 auto; }

      /* ── Cards ── */
      .card {
        background: #1E1E1E;
        border: 1px solid rgba(255,255,255,0.06);
        transition: border-color 0.25s ease, transform 0.25s ease;
      }
      .card:hover { border-color: rgba(240,122,58,0.2); transform: translateY(-3px); }

      /* ── Divider ── */
      .divider { border-top: 1px solid rgba(255,255,255,0.07); }

      /* ── Accent line ── */
      .accent-line {
        display: inline-block;
        width: 2rem;
        height: 1px;
        background: #F07A3A;
        vertical-align: middle;
        margin-right: 0.75rem;
      }

      /* ── Number counter (stats) ── */
      .stat-num {
        font-family: 'Tenor Sans', sans-serif;
        font-weight: 300;
        font-size: clamp(3.5rem, 6vw, 5rem);
        color: #FFFFFF;
        line-height: 1;
      }

      /* ── Portfolio item ── */
      .port-item { position: relative; overflow: hidden; }
      .port-item img { transition: transform 0.6s ease; }
      .port-item:hover img { transform: scale(1.06); }
      .port-overlay {
        position: absolute; inset: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%);
        opacity: 0; transition: opacity 0.35s ease;
      }
      .port-item:hover .port-overlay { opacity: 1; }

      /* ── Process accordion ── */
      .process-item {
        border-top: 1px solid rgba(255,255,255,0.07);
        transition: background 0.25s ease;
      }
      .process-item:last-child { border-bottom: 1px solid rgba(255,255,255,0.07); }

      /* ── Material icons ── */
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        vertical-align: middle;
        line-height: 1;
      }

      /* ── Input dark ── */
      .inp {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 1px solid rgba(255,255,255,0.15);
        padding: 0.875rem 0;
        color: #fff;
        font-family: 'Outfit', sans-serif;
        font-size: 0.875rem;
        outline: none;
        transition: border-color 0.25s ease;
      }
      .inp::placeholder { color: #4A4A4A; }
      .inp:focus { border-bottom-color: #F07A3A; }

      /* ── Service image hover ── */
      .svc-img { overflow: hidden; }
      .svc-img img { transition: transform 0.5s ease; }
      .svc-img:hover img { transform: scale(1.05); }

      /* ── Scroll indicator ── */
      @keyframes bounce-y {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(6px); }
      }
      .scroll-bounce { animation: bounce-y 2s ease-in-out infinite; }

      /* ── Fade in up animation ── */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .anim-in { animation: fadeInUp 0.7s ease forwards; }
      .anim-in-2 { animation: fadeInUp 0.7s 0.15s ease both; }
      .anim-in-3 { animation: fadeInUp 0.7s 0.3s ease both; }

      /* ── Status pills ── */
      .pill-prog { background: rgba(59,130,246,0.12); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); }
      .pill-done { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
      .pill-pend { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
      /* ── Missing Layout Helper Styles ── */
      .badge-primary {
        display: inline-flex;
        align-items: center;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.65rem;
        font-weight: 700;
        font-family: 'Outfit', sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: rgba(240,122,58,0.15);
        color: #F07A3A;
        border: 1px solid rgba(240,122,58,0.25);
      }
      .price-card-featured {
        background: linear-gradient(135deg, #1E1E1E 0%, #151515 100%);
        border: 1px solid rgba(240,122,58,0.3);
        border-radius: 1.25rem;
        box-shadow:
          0 0 0 1px rgba(240,122,58,0.08),
          0 20px 40px rgba(0,0,0,0.6),
          inset 0 1px 0 rgba(240,122,58,0.1);
      }
      .step-number {
        flex-shrink: 0;
        width: 2.5rem; height: 2.5rem;
        border-radius: 0.75rem;
        background: rgba(240,122,58,0.12);
        color: #F07A3A;
        font-family: 'Tenor Sans', sans-serif;
        font-size: 1.1rem;
        font-weight: 400;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(240,122,58,0.2);
      }
      .gradient-text {
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        background-image: linear-gradient(135deg, #F07A3A 0%, #FF9A5C 60%, #F07A3A 100%);
      }
      .card-base {
        background: #1E1E1E;
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 1.25rem;
        transition: border-color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
      }
      .card-hover {
        transition: border-color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
      }
      .card-hover:hover {
        border-color: rgba(240,122,58,0.2) !important;
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(0,0,0,0.5) !important;
      }

      /* ── Global Dark Mode Compatibility Overrides for Hardcoded Light Styles ── */
      .bg-white { background-color: #121212 !important; }
      .bg-gray-50 { background-color: #0E0E0E !important; }
      .bg-slate-50 { background-color: #0E0E0E !important; }
      .bg-zinc-100 { background-color: #1A1A1A !important; }

      .border-gray-100 { border-color: rgba(255,255,255,0.05) !important; }
      .border-gray-200 { border-color: rgba(255,255,255,0.08) !important; }
      .border-slate-200 { border-color: rgba(255,255,255,0.06) !important; }
      .border-[#e8dbce], .border-[#e9dace], .border-[#f4ede6] { border-color: rgba(255,255,255,0.06) !important; }

      .text-slate-600 { color: #BDBDBD !important; }
      .text-slate-900 { color: #FFFFFF !important; }
      .text-slate-700 { color: #D1D1D1 !important; }
      .text-gray-500 { color: #737373 !important; }
      .text-gray-600 { color: #A3A3A3 !important; }
      .text-gray-400 { color: #555555 !important; }
      .text-black { color: #FFFFFF !important; }
      .text-text-main { color: #FFFFFF !important; }

      /* Shadows on dark backgrounds */
      .shadow-sm, .shadow-md, .shadow-lg, .shadow-xl, .shadow-2xl {
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45) !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
